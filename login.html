<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SawaChat | Login</title>
    <meta name="description" content="Login to your SawaChat account using your anonymous User ID and password.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="bg-layer" aria-hidden="true">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <div class="page-wrapper">

        <header class="app-header">
            <img src="appmark.png" alt="SawaChat" class="app-logo">
            <h1 class="app-name">SawaChat</h1>
            <p class="app-tagline" id="greeting">Welcome Back</p>
        </header>

        <main class="card">
            <a href="index.html" class="btn-back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
                Back
            </a>

            <div class="card-body center-content">
                <p class="card-subtitle">Login with your User ID or Username</p>

                <form id="login-form" class="form-full" novalidate>

                    <div class="input-group">
                        <label for="login-username">User ID / Username</label>
                        <div class="input-wrapper">
                            <span class="input-prefix">@</span>
                            <input type="text" id="login-username" name="username" placeholder="your_username"
                                autocomplete="username" autocapitalize="none" spellcheck="false" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg>
                            </span>
                            <input type="password" id="login-password" name="password" placeholder="••••••••"
                                autocomplete="current-password" required>
                            <button type="button" class="toggle-pw" data-target="login-password"
                                aria-label="Toggle password">
                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                                <svg class="eye-closed hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                                    <line x1="1" y1="1" x2="23" y2="23" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="remember-row">
                        <label class="checkbox-label" for="auto-login">
                            <input type="checkbox" id="auto-login" name="auto_login">
                            <span class="checkbox-custom"></span>
                            Remember me
                        </label>
                    </div>

                    <div class="error-msg hidden" id="login-error">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="15" y1="9" x2="9" y2="15" />
                            <line x1="9" y1="9" x2="15" y2="15" />
                        </svg>
                        <span id="login-error-text">Invalid User ID or password.</span>
                    </div>

                    <button type="submit" class="btn-primary btn-full btn-loader-wrap" id="login-btn">
                        <span class="btn-label">Login to Existing Account</span>
                        <div class="btn-spinner"></div>
                    </button>
                </form>

                <p class="form-footer">
                    Don't have an account? <a href="signup.html" id="go-signup">Create one</a>
                </p>
            </div>
        </main>

    </div>

    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <!-- Compiled from public/login.ts -->
    <script type="module" src="public/login.js"></script>
</body>

</html>
