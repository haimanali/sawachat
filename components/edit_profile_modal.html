<div class="modal-overlay" id="edit-profile-modal" aria-hidden="true">
    <div class="modal">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 data-i18n="edit_profile_title" style="font-size: 1.5rem; font-weight: 700;">Edit Profile</h2>
            <button class="icon-btn" id="close-edit-profile" aria-label="Close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>

        <form id="edit-profile-form">
            <div class="input-group" style="margin-bottom: 24px;">
                <label data-i18n="display_name" for="edit-nickname-input">Display Name</label>
                <input type="text" id="edit-nickname-input" placeholder="Nickname" autocomplete="off" required minlength="2">
            </div>

            <div style="display: flex; justify-content: flex-end;">
                <button type="submit" class="btn-primary" style="padding: 10px 24px;">
                    <span data-i18n="save_changes">Save Changes</span>
                </button>
            </div>
        </form>
    </div>
</div>
