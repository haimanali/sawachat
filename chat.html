<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SawaChat | Messages</title>
    <meta name="description" content="SawaChat anonymous messaging dashboard.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="chat-container">
        <!-- Sidebar: Chat List -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h2 data-i18n="chats_title">Chats</h2>
                <button class="icon-btn" id="settings-btn" aria-label="Settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                </button>
            </div>

            <!-- Add Friend Button -->
            <div class="friend-search">
                <button class="btn-primary btn-full" id="open-add-friend-btn"
                    style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="width: 18px; height: 18px;">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    <span data-i18n="add_friend_btn">Add a Friend</span>
                </button>
            </div>

            <div class="chat-list" id="chat-list">
                <!-- Chat items populated by JS -->
            </div>

            <div style="padding: 16px; border-top: 1px solid var(--border);">
                <div class="chat-item" id="logout-btn" style="color: var(--error);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="width:20px; height:20px;">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <strong data-i18n="logout_btn">Log out</strong>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Header -->
            <header class="chat-header">
                <div class="chat-avatar" id="active-chat-avatar">S</div>
                <div class="chat-meta">
                    <h2 class="chat-name" id="active-chat-name">Select a chat</h2>
                    <p class="chat-preview" style="color: var(--primary);">Secure E2EE Channel</p>
                </div>

                <div style="display: flex; gap: 8px; position: relative;">
                    <button class="icon-btn" id="chat-options-btn" aria-label="Menu" title="Menu"
                        style="display: none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="5" r="1.5" />
                            <circle cx="12" cy="12" r="1.5" />
                            <circle cx="12" cy="19" r="1.5" />
                        </svg>
                    </button>
                    <!-- Dropdown -->
                    <div class="dropdown-menu" id="chat-dropdown">
                        <div class="dropdown-item" data-i18n="contact_info">Contact Info</div>
                        <div class="dropdown-item" data-i18n="change_wallpaper">Change Wallpaper</div>
                        <div class="dropdown-item" data-i18n="archive_chat">Archive Chat</div>
                        <div class="dropdown-item" id="export-chat-btn" data-i18n="export_chat">Export Chat</div>
                        <div class="dropdown-item" data-i18n="clear_chat" style="color: var(--error);">Clear Chat</div>
                    </div>
                </div>
            </header>

            <!-- Messages -->
            <div class="messages-area" id="messages-area">
                <!-- Empty state initially -->
                <div style="margin: auto; text-align: center; color: var(--text-muted);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5;">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                    </svg>
                    <p data-i18n="empty_state">End-to-end encrypted messaging.</p>
                </div>
            </div>

            <!-- Input Box -->
            <form class="chat-input-area" id="message-form" style="display: none;">
                <input type="text" id="message-input" placeholder="Type a secure message..." autocomplete="off">
                <button type="submit"
                    style="background: var(--primary); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all 0.2s;"
                    aria-label="Send">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="width: 20px; height: 20px; margin-left: 2px;">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </form>
        </main>
    </div>

    <!-- Modals (Dynamically Loaded by JS) -->
    <div id="modals-container"></div>

    <!-- Toast for alerts -->
    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <!-- Logic -->
    <script type="module" src="public/chat.js"></script>
</body>

</html>
