<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SawaChat | System Error</title>
    <meta name="description" content="SawaChat system error.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="bg-layer" aria-hidden="true">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <div class="page-wrapper">

        <header class="app-header">
            <img src="appmark.png" alt="SawaChat" class="app-logo">
            <h1 class="app-name">SawaChat</h1>
        </header>

        <main class="card" aria-label="Error">
            <div class="card-body center-content">
                <div class="avatar-ring" style="background: rgba(244, 67, 54, 0.1); border-color: rgba(244, 67, 54, 0.3);">
                    <!-- Red warning triangle -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="#f44336" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>

                <h2 class="card-title" style="margin-top: 20px;">System Error</h2>
                <p class="card-subtitle">
                    We're experiencing temporary server issues or database connectivity problems. Our engineering team has been notified.
                </p>

                <div class="warn-box" style="margin-top: 32px; text-align: left; display: flex; align-items: flex-start; gap: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 12px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px; flex-shrink: 0; margin-top: 2px;">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <div style="font-size: 0.9rem; line-height: 1.5; color: rgba(255,255,255,0.85);">
                        <strong style="color: white; font-weight: 600;">Error Code:</strong> <span id="error-code">500 Server Error</span><br>
                        Please check your connection and try again in a few minutes.
                    </div>
                </div>

                <a href="index.html" class="btn-primary btn-full" style="margin-top: 32px; text-align: center;">
                    Return to Home
                </a>
            </div>
        </main>

    </div>
    
    <script>
        // Extract error code from URL query parameter (e.g. error.html?code=503)
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code) {
            document.getElementById('error-code').textContent = code;
        }
    </script>
</body>

</html>
